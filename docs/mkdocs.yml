site_name: Kube KTS User Guide
copyright: "Copyright (c) KleinerHacker alias pcsoft 2026."

docs_dir: docs
site_dir: ../build/docs

markdown_extensions:
  - admonition
  - toc:
      toc_depth: 3
#  - pymdownx.snippets
#  - pymdownx.highlight

theme:
  name: material
  language: en
  logo: assets/images/icon.png
  favicon: assets/images/icon.png
  features:
    - navigation.sections
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode (matches the dark logo background)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 简体中文
          build: true
          nav_translations:
            Home: 首页
            CLI: 命令行 (CLI)
            Kotlin Scripts Repository: Kotlin 脚本仓库
            Chart: Chart
            Templates: 模板
            Metadata: 元数据
            Service: 服务
            Ingress: Ingress
            Route: 路由
            ConfigMap: ConfigMap
            Secret: 密钥
            SealedSecret: SealedSecret
            Deployment: 部署
            Job: Job
            Overview: 概览
            Selector: 选择器
            Pod Template: Pod 模板
            Pod Spec: Pod 规约
            Containers: 容器
            Probes: 探针
            Volumes: 卷
            Strategy: 策略
            Library Files: 库文件
            Values Handling: 值处理
            API Docs: API 文档
            Licences: 许可证
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            CLI: CLI
            Kotlin Scripts Repository: Kotlin スクリプトリポジトリ
            Chart: チャート
            Templates: テンプレート
            Metadata: メタデータ
            Service: サービス
            Ingress: Ingress
            Route: ルート
            ConfigMap: ConfigMap
            Secret: シークレット
            SealedSecret: SealedSecret
            Deployment: デプロイメント
            Job: ジョブ
            Overview: 概要
            Selector: セレクター
            Pod Template: Pod テンプレート
            Pod Spec: Pod スペック
            Containers: コンテナ
            Probes: プローブ
