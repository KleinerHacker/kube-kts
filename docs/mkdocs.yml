site_name: Kube KTS User Guide

markdown_extensions:
  - admonition
  - toc:
      toc_depth: 3
#  - pymdownx.snippets
#  - pymdownx.highlight

theme:
  name: material
  language: de
  features:
    - navigation.sections
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - CLI: cli.md
  - Kotlin Scripts Repository:
      - Chart: kts/chart.md
      - Service: kts/service.md
      - Ingress: kts/ingress.md
      - Values Handling: kts/values.md
