apiVersion: v1
kind: Service
metadata:
  name: name
  generateName: "generated-name"
  namespace: namespace
  labels: {}
  annotations: {}
  finalizers: []
  ownerReferences: []
spec:
  type: LoadBalancer                  # ClusterIP | NodePort | LoadBalancer | ExternalName
  selector: {}

  ports:
    - name: port
      protocol: SCTP               # TCP | UDP | SCTP
      appProtocol: https
      port: 9999
      targetPort: 8888            # int oder string
      nodePort: 7777

  clusterIP: ""
  clusterIPs: []
  ipFamilies: []                  # IPv4 | IPv6
  ipFamilyPolicy: SingleStack     # SingleStack | PreferDualStack | RequireDualStack

  externalIPs: []
  externalName: ""

  externalTrafficPolicy: Cluster  # Cluster | Local
  internalTrafficPolicy: Cluster  # Cluster | Local

  allocateLoadBalancerNodePorts: true
  loadBalancerIP: ""
  loadBalancerClass: ""
  loadBalancerSourceRanges: []

  sessionAffinity: None           # None | ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

  publishNotReadyAddresses: false

  healthCheckNodePort: 0

  trafficDistribution: ""