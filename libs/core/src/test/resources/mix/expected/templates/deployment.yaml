---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata
  namespace: namespace
  generateName: generateName
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo
    matchExpressions:
      - key: tier
        operator: In
        values:
          - backend
  template:
    metadata:
      labels:
        app: demo
      annotations:
        description: Demo pod template
    spec:
      containers:
        - name: name
          image: image
      restartPolicy: Always
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "10%"
      maxUnavailable: 3
  minReadySeconds: 30
  revisionHistoryLimit: 5
  paused: true
  progressDeadlineSeconds: 600